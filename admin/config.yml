backend:
  name: git-gateway
  branch: main

media_folder: "img"
public_folder: "img"
show_preview_links: false

collections:
  - name: "paginas"
    label: "⚙️ Construtor do Site"
    delete: false
    editor:
      preview: false
    files:
      - file: "data/home.json"
        label: "Página Principal (Home)"
        name: "home"
        fields:
          - { label: "Título da Aba do Navegador", name: "site_title", widget: "string", required: false }
          
          # AQUI É A MÁGICA: Uma lista onde você cria quantos blocos quiser
          - name: "secoes"
            label: "Seções do Site (Crie os blocos da página)"
            widget: "list"
            summary: 'Bloco: {{fields.titulo}}'
            fields:
              - { label: "Título", name: "titulo", widget: "string", required: false }
              - { label: "Texto", name: "texto", widget: "text", required: false }
              - { label: "Posição", name: "layout", widget: "select", options: ["Midia na Direita", "Midia na Esquerda", "Centralizado", "Sem Midia"], default: "Midia na Direita" }
              - { label: "O que vai mostrar?", name: "tipo_midia", widget: "select", options: ["Imagem", "YouTube"], default: "Imagem" }
              - { label: "Imagem (Se escolheu Imagem)", name: "imagem", widget: "image", required: false }
              - { label: "Link do YouTube (Se escolheu YouTube)", name: "youtube", widget: "string", hint: "Ex: https://www.youtube.com/watch?v=...", required: false }
              - { label: "Texto do Botão", name: "texto_botao", widget: "string", required: false }
              - { label: "Link do Botão", name: "link_botao", widget: "string", required: false }