<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saldo Extra</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <span>Saldo Extra</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Início</a></li>
        </ul>
    </nav>

    <main id="conteudo-dinamico">
        <div style="text-align: center; padding: 200px 20px;">
            <h2>Atualizando seu site...</h2>
            <p>Se demorar muito, acesse o /admin e crie sua primeira seção!</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Seus Prompts. Todos os direitos reservados.</p>
    </footer>

    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
          }
        });
      }
    </script>

    <script>
      fetch('/data/home.json')
        .then(res => res.json())
        .then(data => {
          if(data.site_title) document.title = data.site_title;
          
          const main = document.getElementById('conteudo-dinamico');
          main.innerHTML = ''; // Limpa a mensagem de carregando
          
          if(data.secoes && data.secoes.length > 0) {
            data.secoes.forEach(secao => {
              
              // Lógica de Mídia (YouTube ou Imagem)
              let mediaHTML = '';
              if (secao.tipo_midia === 'YouTube' && secao.youtube) {
                  let ytID = '';
                  if (secao.youtube.includes('v=')) ytID = secao.youtube.split('v=')[1].split('&')[0];
                  else if (secao.youtube.includes('youtu.be/')) ytID = secao.youtube.split('youtu.be/')[1].split('?')[0];
                  
                  if (ytID) {
                      mediaHTML = `<iframe class="media-dinamica video-yt" src="https://www.youtube.com/embed/${ytID}" frameborder="0" allowfullscreen></iframe>`;
                  }
              } else if (secao.tipo_midia === 'Imagem' && secao.imagem) {
                  mediaHTML = `<img src="${secao.imagem}" class="media-dinamica">`;
              }

              // Lógica do Botão
              let botaoHTML = secao.texto_botao && secao.link_botao 
                ? `<a href="${secao.link_botao}" class="btn-comprar">${secao.texto_botao}</a>` : '';

              // Decide a Posição
              let classeLayout = 'layout-direita';
              if (secao.layout === 'Midia na Esquerda') classeLayout = 'layout-esquerda';
              if (secao.layout === 'Centralizado') classeLayout = 'layout-centro';
              if (secao.layout === 'Sem Midia') mediaHTML = '';

              // Monta e joga na tela
              const sectionHTML = `
                <section class="secao-bloco ${classeLayout}">
                   <div class="bloco-texto">
                      ${secao.titulo ? `<h1>${secao.titulo}</h1>` : ''}
                      ${secao.texto ? `<p>${secao.texto}</p>` : ''}
                      ${botaoHTML}
                   </div>
                   ${mediaHTML ? `<div class="bloco-midia">${mediaHTML}</div>` : ''}
                </section>
              `;
              main.innerHTML += sectionHTML;
            });
          }
        })
        .catch(err => console.log('Aguardando criação no painel...'));
    </script>
</body>
</html>
